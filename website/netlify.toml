[build]
base = "website"
publish = "dist"
command = "pnpm run build"

[build.environment]
NODE_VERSION = "22"
PNPM_VERSION = "10.34.3"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=86400"
